<!doctype html>
<html>
  <head>
    <title>Calculator Dev 4</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .box {
        text-align: center;
      }
      input,
      button {
        margin: 5px;
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h2>Calculator</h2>

      <input id="n1" type="number" /><br />
      <input id="n2" type="number" /><br />

      <button onclick="add()">+</button>
      <button onclick="sub()">-</button>
      <button onclick="mul()">*</button>
      <button onclick="div()">/</button>

      <p id="ans"></p>
    </div>

    <script>
      function add() {
        calc((a, b) => a + b);
      }
      function sub() {
        calc((a, b) => a - b);
      }
      function mul() {
        calc((a, b) => a * b);
      }
      function div() {
        calc((a, b) => a / b);
      }

      function calc(fn) {
        let a = Number(document.getElementById("n1").value);
        let b = Number(document.getElementById("n2").value);
        document.getElementById("ans").innerText = fn(a, b);
      }
    </script>
  </body>
</html>
