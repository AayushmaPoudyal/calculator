<!DOCTYPE html>
<html>
<head>
  <title>Calculator</title>
  <style>
    body { text-align: center; }
    input { margin: 5px; padding: 10px; }
    button { padding: 10px; margin: 5px; }
  </style>
</head>
<body>

<h2>Calculator</h2>

<input type="number" id="num1" placeholder="First number">
<input type="number" id="num2" placeholder="Second number"><br>

<button onclick="calc('+')">Add</button>
<button onclick="calc('-')">Subtract</button>
<button onclick="calc('*')">Multiply</button>
<button onclick="calc('/')">Divide</button>

<h3 id="output"></h3>

<script>
function calc(op) {
  let a = parseFloat(document.getElementById("num1").value);
  let b = parseFloat(document.getElementById("num2").value);
  let result;

  if(op == '+') result = a + b;
  if(op == '-') result = a - b;
  if(op == '*') result = a * b;
  if(op == '/') result = a / b;

  document.getElementById("output").innerText = "Result: " + result;
}
</script>

</body>
</html>
